<div class="min-h-screen flex items-center justify-center py-6 sm:py-12 px-4 sm:px-6 lg:px-8" style="background-color: #f3f4f6;">
  <div class="max-w-md w-full">
    <div class="text-center mb-6 sm:mb-8">
      <h2 class="text-2xl sm:text-3xl font-bold" style="color: #111827;">Bienvenido</h2>
      <p class="mt-2 text-xs sm:text-sm" style="color: #4b5563;">Sistema de Gestión de Agenda</p>
    </div>

    <div class="rounded-xl shadow-sm p-4 sm:p-6 lg:p-8" style="background-color: white; border: 1px solid #e5e7eb;">
      <form class="space-y-4 sm:space-y-5" (ngSubmit)="onSubmit()">
        @if (error()) {
          <div class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg">
            {{ error() }}
          </div>
        }

        <div class="bg-blue-50 border border-blue-200 rounded-lg p-3">
          <p class="text-xs text-blue-800 mb-2">Credenciales de prueba:</p>
          <app-button
            type="button"
            (clicked)="fillTestCredentials()"
            variant="ghost"
            size="xs"
          >
            admin&#64;agenda.com / admin123
          </app-button>
        </div>

        <app-input
          type="email"
          name="email"
          label="Email"
          placeholder="admin@agenda.com"
          [value]="email"
          (valueChange)="email = $event"
          [disabled]="loading()"
          size="md"
        ></app-input>

        <app-input
          type="password"
          name="password"
          label="Contraseña"
          placeholder="Ingresa tu contraseña"
          [value]="password"
          (valueChange)="password = $event"
          [disabled]="loading()"
          size="md"
        ></app-input>

        <app-button
          type="submit"
          [disabled]="!email || !password || loading()"
          [loading]="loading()"
          variant="primary"
          size="lg"
          [fullWidth]="true"
        >
          Iniciar Sesión
        </app-button>
      </form>
    </div>
  </div>
</div>
